version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autoedit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoedit}
      POSTGRES_DB: ${POSTGRES_DB:-autoedit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoedit"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-autoedit}:${POSTGRES_PASSWORD:-autoedit}@postgres:5432/${POSTGRES_DB:-autoedit}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-autoedit}:${POSTGRES_PASSWORD:-autoedit}@postgres:5432/${POSTGRES_DB:-autoedit}
      - REDIS_URL=redis://redis:6379/0
      # IMPORTANT: SECRET_KEY DOIT être défini dans `.env`.
      # Sans valeur stable, le backend genere une cle aleatoire au demarrage et
      # toutes les sessions JWT sont invalidees a chaque restart.
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required (see .env.example)}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost
      - UPLOAD_DIR=/app/uploads
      - MAX_UPLOAD_SIZE_MB=500
      - WHISPER_MODEL=base
      - FEDAPAY_ENV=sandbox
      - FEDAPAY_SECRET_KEY=${FEDAPAY_SECRET_KEY:-}
      - FEDAPAY_PUBLIC_KEY=${FEDAPAY_PUBLIC_KEY:-}
      # Pipeline V2 / B-roll IA — toutes optionnelles
      - PIPELINE_VERSION=${PIPELINE_VERSION:-v1}
      - IMAGE_GENERATION_PROVIDER=${IMAGE_GENERATION_PROVIDER:-openrouter}
      - IMAGE_GENERATION_MODEL=${IMAGE_GENERATION_MODEL:-google/gemini-2.5-flash-image-preview}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - BROLL_STYLE=${BROLL_STYLE:-african_business_premium}
      - VIDEO_RENDERER=${VIDEO_RENDERER:-ffmpeg}
      - ENABLE_AI_BROLL=${ENABLE_AI_BROLL:-true}
      - ENABLE_DYNAMIC_CAPTIONS=${ENABLE_DYNAMIC_CAPTIONS:-true}
      - ENABLE_SFX=${ENABLE_SFX:-true}
      - ENABLE_MUSIC=${ENABLE_MUSIC:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-autoedit}:${POSTGRES_PASSWORD:-autoedit}@postgres:5432/${POSTGRES_DB:-autoedit}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-autoedit}:${POSTGRES_PASSWORD:-autoedit}@postgres:5432/${POSTGRES_DB:-autoedit}
      - REDIS_URL=redis://redis:6379/0
      # IMPORTANT: SECRET_KEY DOIT être défini dans `.env`.
      # Sans valeur stable, le backend genere une cle aleatoire au demarrage et
      # toutes les sessions JWT sont invalidees a chaque restart.
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required (see .env.example)}
      - UPLOAD_DIR=/app/uploads
      - WHISPER_MODEL=base
      # Pipeline V2 / B-roll IA — toutes optionnelles
      - PIPELINE_VERSION=${PIPELINE_VERSION:-v1}
      - IMAGE_GENERATION_PROVIDER=${IMAGE_GENERATION_PROVIDER:-openrouter}
      - IMAGE_GENERATION_MODEL=${IMAGE_GENERATION_MODEL:-google/gemini-2.5-flash-image-preview}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - BROLL_STYLE=${BROLL_STYLE:-african_business_premium}
      - VIDEO_RENDERER=${VIDEO_RENDERER:-ffmpeg}
      - ENABLE_AI_BROLL=${ENABLE_AI_BROLL:-true}
      - ENABLE_DYNAMIC_CAPTIONS=${ENABLE_DYNAMIC_CAPTIONS:-true}
      - ENABLE_SFX=${ENABLE_SFX:-true}
      - ENABLE_MUSIC=${ENABLE_MUSIC:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  uploads_data:
