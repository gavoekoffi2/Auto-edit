version: "3.9"

# =========================================================================
# Compose de DEVELOPPEMENT.
# Pour la prod: `docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d`
# =========================================================================

x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-development}
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-autoedit}:${POSTGRES_PASSWORD:-autoedit}@postgres:5432/${POSTGRES_DB:-autoedit}
  DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-autoedit}:${POSTGRES_PASSWORD:-autoedit}@postgres:5432/${POSTGRES_DB:-autoedit}
  REDIS_URL: redis://redis:6379/0
  # IMPORTANT: SECRET_KEY est REQUIS. Generer: openssl rand -hex 32
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required (cf. .env.example)}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost}
  UPLOAD_DIR: /app/uploads
  MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-5120}
  MAX_VIDEO_DURATION_FREE: ${MAX_VIDEO_DURATION_FREE:-900}
  MAX_VIDEO_DURATION_PRO: ${MAX_VIDEO_DURATION_PRO:-3600}
  CELERY_TASK_TIME_LIMIT_SECONDS: ${CELERY_TASK_TIME_LIMIT_SECONDS:-0}
  CELERY_TASK_SOFT_TIME_LIMIT_SECONDS: ${CELERY_TASK_SOFT_TIME_LIMIT_SECONDS:-0}
  CELERY_VISIBILITY_TIMEOUT_SECONDS: ${CELERY_VISIBILITY_TIMEOUT_SECONDS:-10800}
  # Fonctionnalité Clips — limites par plan
  CLIPS_MAX_SOURCE_DURATION_FREE: ${CLIPS_MAX_SOURCE_DURATION_FREE:-1800}
  CLIPS_MAX_SOURCE_DURATION_PRO: ${CLIPS_MAX_SOURCE_DURATION_PRO:-5400}
  CLIPS_MAX_SOURCE_DURATION_BUSINESS: ${CLIPS_MAX_SOURCE_DURATION_BUSINESS:-10800}
  CLIPS_MAX_PER_JOB_FREE: ${CLIPS_MAX_PER_JOB_FREE:-3}
  CLIPS_MAX_PER_JOB_PRO: ${CLIPS_MAX_PER_JOB_PRO:-10}
  CLIPS_MAX_PER_JOB_BUSINESS: ${CLIPS_MAX_PER_JOB_BUSINESS:-15}
  # Rétention (purge automatique, jours; 0 = jamais)
  RETENTION_OUTPUT_DAYS: ${RETENTION_OUTPUT_DAYS:-14}
  RETENTION_SOURCE_DAYS: ${RETENTION_SOURCE_DAYS:-7}
  RETENTION_FAILED_JOB_DAYS: ${RETENTION_FAILED_JOB_DAYS:-2}
  # Recadrage vertical intelligent + nettoyage IA
  SMART_CROP_MODE: ${SMART_CROP_MODE:-auto}
  ENGINE_LLM_CLEANUP: ${ENGINE_LLM_CLEANUP:-1}
  ENGINE_LLM_CLEANUP_LEVEL: ${ENGINE_LLM_CLEANUP_LEVEL:-light}
  ENGINE_LLM_CLEANUP_MODEL: ${ENGINE_LLM_CLEANUP_MODEL:-google/gemini-2.5-flash-lite}
  ENGINE_VIRAL_MOMENTS_MODEL: ${ENGINE_VIRAL_MOMENTS_MODEL:-google/gemini-2.5-flash-lite}
  FFMPEG_COMMAND_TIMEOUT_SECONDS: ${FFMPEG_COMMAND_TIMEOUT_SECONDS:-21600}
  TRANSCRIPTION_PROVIDER: ${TRANSCRIPTION_PROVIDER:-auto}
  TRANSCRIPTION_LANGUAGE: ${TRANSCRIPTION_LANGUAGE:-fr}
  ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
  WHISPER_MODEL: ${WHISPER_MODEL:-small}
  WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-fr}
  WHISPER_INITIAL_PROMPT: ${WHISPER_INITIAL_PROMPT:-}
  PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost}
  # Paiement
  FEDAPAY_ENV: ${FEDAPAY_ENV:-sandbox}
  FEDAPAY_SECRET_KEY: ${FEDAPAY_SECRET_KEY:-}
  FEDAPAY_PUBLIC_KEY: ${FEDAPAY_PUBLIC_KEY:-}
  # Pipeline V2 / B-roll IA
  PIPELINE_VERSION: ${PIPELINE_VERSION:-v1}
  IMAGE_GENERATION_PROVIDER: ${IMAGE_GENERATION_PROVIDER:-openrouter}
  IMAGE_GENERATION_MODEL: ${IMAGE_GENERATION_MODEL:-google/gemini-2.5-flash-image-preview}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  BROLL_STYLE: ${BROLL_STYLE:-african_business_premium}
  BROLL_MAX_CUES_PER_VIDEO: ${BROLL_MAX_CUES_PER_VIDEO:-14}
  BROLL_SHORTS_MAX_DURATION_SECONDS: ${BROLL_SHORTS_MAX_DURATION_SECONDS:-90.0}
  BROLL_SHORTS_MAX_CUES_PER_VIDEO: ${BROLL_SHORTS_MAX_CUES_PER_VIDEO:-18}
  # Cadence cost-aware: le motion design (gratuit) porte une partie du rythme.
  SECONDS_PER_BROLL: ${SECONDS_PER_BROLL:-7.0}
  SECONDS_PER_BROLL_WITH_MOTION: ${SECONDS_PER_BROLL_WITH_MOTION:-9.0}
  SHORTS_MAX_DURATION_SECONDS: ${SHORTS_MAX_DURATION_SECONDS:-90.0}
  SHORTS_SECONDS_PER_BROLL: ${SHORTS_SECONDS_PER_BROLL:-4.5}
  SHORTS_SECONDS_PER_BROLL_WITH_MOTION: ${SHORTS_SECONDS_PER_BROLL_WITH_MOTION:-5.0}
  MAX_BROLL_IMAGES: ${MAX_BROLL_IMAGES:-18}
  MOTION_AI_ILLUSTRATIONS_MAX: ${MOTION_AI_ILLUSTRATIONS_MAX:-12}
  MOTION_MAX_SCENES: ${MOTION_MAX_SCENES:-40}
  MOTION_EVERY_SHORT: ${MOTION_EVERY_SHORT:-13.0}
  MOTION_EVERY_LONG: ${MOTION_EVERY_LONG:-16.0}
  PROMPT_REFINER_ENABLED: ${PROMPT_REFINER_ENABLED:-1}
  PROMPT_REFINER_MODEL: ${PROMPT_REFINER_MODEL:-google/gemini-2.5-flash-lite}
  ENGINE_REMOVE_RETAKES: ${ENGINE_REMOVE_RETAKES:-1}
  VIDEO_RENDERER: ${VIDEO_RENDERER:-ffmpeg}
  ENABLE_AI_BROLL: ${ENABLE_AI_BROLL:-true}
  ENABLE_MOTION_DESIGN: ${ENABLE_MOTION_DESIGN:-true}
  ENABLE_DYNAMIC_CAPTIONS: ${ENABLE_DYNAMIC_CAPTIONS:-true}
  ENABLE_SFX: ${ENABLE_SFX:-true}
  ENABLE_MUSIC: ${ENABLE_MUSIC:-true}
  # Email
  EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
  EMAIL_FROM: ${EMAIL_FROM:-CutForge <noreply@cutforge.app>}
  ADMIN_EMAILS: ${ADMIN_EMAILS:-}
  EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-}
  EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
  EMAIL_SMTP_USER: ${EMAIL_SMTP_USER:-}
  EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}
  SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
  # Observabilite
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autoedit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoedit}
      POSTGRES_DB: ${POSTGRES_DB:-autoedit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autoedit}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-shot: corrige les permissions du volume d'uploads. Les volumes nommés
  # sont souvent créés en root, alors que backend/worker tournent en utilisateur
  # `app` (uid 1000) et ne peuvent alors pas y écrire (upload -> 500). Ce service
  # s'exécute en root, fixe les droits, puis sort. backend/worker l'attendent.
  init-uploads:
    image: busybox:1.36
    command: ["sh", "-c", "mkdir -p /app/uploads && chown -R 1000:1000 /app/uploads && chmod -R u+rwX,g+rwX /app/uploads"]
    user: "0:0"
    volumes:
      - uploads_data:/app/uploads
    restart: "no"

  backend:
    build: ./backend
    # Une seule image applicative est construite. Worker et beat la réutilisent :
    # exporter trois fois l'image Whisper/PyTorch (~4 Go) saturait le VPS.
    image: autoeditprod-backend:latest
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      <<: *backend-env
    depends_on:
      init-uploads:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: autoeditprod-backend:latest
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-2}
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    environment:
      <<: *backend-env
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$HOSTNAME --timeout=10 | grep -q pong"]
      interval: 30s
      timeout: 15s
      start_period: 30s
      retries: 3
    depends_on:
      init-uploads:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Planificateur des tâches périodiques (purge de rétention quotidienne).
  # Sans lui, purge_expired_files n'est JAMAIS déclenchée automatiquement.
  beat:
    image: autoeditprod-backend:latest
    command: celery -A app.workers.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
