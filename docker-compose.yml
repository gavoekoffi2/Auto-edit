services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autoedit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoedit}
      POSTGRES_DB: ${POSTGRES_DB:-autoedit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autoedit}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-autoedit}:${POSTGRES_PASSWORD:-autoedit}@postgres:5432/${POSTGRES_DB:-autoedit}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-autoedit}:${POSTGRES_PASSWORD:-autoedit}@postgres:5432/${POSTGRES_DB:-autoedit}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost}
      - UPLOAD_DIR=/app/uploads
      - MAX_UPLOAD_SIZE_MB=500
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - FEDAPAY_ENV=${FEDAPAY_ENV:-sandbox}
      - FEDAPAY_SECRET_KEY=${FEDAPAY_SECRET_KEY:-}
      - FEDAPAY_PUBLIC_KEY=${FEDAPAY_PUBLIC_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker.Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - uploads_data:/app/uploads
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-autoedit}:${POSTGRES_PASSWORD:-autoedit}@postgres:5432/${POSTGRES_DB:-autoedit}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-autoedit}:${POSTGRES_PASSWORD:-autoedit}@postgres:5432/${POSTGRES_DB:-autoedit}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-}
      - UPLOAD_DIR=/app/uploads
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - REMOTION_DIR=/opt/remotion
      - REMOTION_CONCURRENCY=${REMOTION_CONCURRENCY:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  uploads_data:
