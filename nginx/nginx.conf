worker_processes auto;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    # ---------------------------------------------------------------------
    # Tailles & timeouts
    # ---------------------------------------------------------------------
    client_max_body_size 550M;             # > 500 Mo upload + marge
    client_body_timeout 120s;
    client_header_timeout 30s;
    keepalive_timeout 65s;
    send_timeout 60s;
    server_tokens off;                     # ne pas exposer la version nginx

    # ---------------------------------------------------------------------
    # Logs
    # ---------------------------------------------------------------------
    log_format combined_json escape=json
        '{"time":"$time_iso8601","remote_addr":"$remote_addr",'
        '"request":"$request","status":$status,"bytes_sent":$bytes_sent,'
        '"http_referer":"$http_referer","http_user_agent":"$http_user_agent",'
        '"request_time":$request_time,"upstream_response_time":"$upstream_response_time",'
        '"x_request_id":"$upstream_http_x_request_id"}';
    access_log /var/log/nginx/access.log combined_json;
    error_log  /var/log/nginx/error.log warn;

    # ---------------------------------------------------------------------
    # Rate limiting (zones globales)
    #   - api_zone       : limite generale APIs
    #   - api_login_zone : limite stricte sur login (anti brute-force)
    # ---------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_zone:10m       rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api_login_zone:10m rate=10r/m;
    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # ---------------------------------------------------------------------
    # Gzip
    # ---------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml font/woff2;

    # Docker embedded DNS. Use variables in proxy_pass so nginx re-resolves
    # backend/frontend after containers are recreated during deploys.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ---------------------------------------------------------------------
    # Headers de securite reutilisables
    # ---------------------------------------------------------------------
    map $sent_http_content_type $set_security_headers { default 1; }

    server {
        listen 80 default_server;
        server_name _;

        # 1 IP -> max 30 connexions concurrentes (mitige DoS basique)
        limit_conn conn_per_ip 30;

        # Security headers (s'appliquent a TOUTES les responses)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # HSTS — actif uniquement quand on est sert en HTTPS via une terminaison TLS
        # en amont (load balancer / CloudFront / Caddy). On laisse l'entete, il sera
        # ignore en HTTP pur par les navigateurs.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # CSP — volontairement permissive pour ne pas casser Vite/Unsplash/SVG inline.
        # A durcir une fois le frontend stabilise (ex: nonces, hashes).
        add_header Content-Security-Policy
            "default-src 'self'; img-src 'self' data: https://images.unsplash.com https:; \
             style-src 'self' 'unsafe-inline'; \
             font-src 'self' data:; \
             script-src 'self' 'unsafe-inline'; \
             connect-src 'self' https:; \
             frame-ancestors 'none';" always;

        # -----------------------------------------------------------------
        # API
        # -----------------------------------------------------------------
        location = /api/v1/auth/login {
            limit_req zone=api_login_zone burst=5 nodelay;
            include /etc/nginx/conf.d/_proxy_backend.conf;
        }
        location = /api/v1/auth/signup {
            limit_req zone=api_login_zone burst=5 nodelay;
            include /etc/nginx/conf.d/_proxy_backend.conf;
        }
        location = /api/v1/auth/password-reset/request {
            limit_req zone=api_login_zone burst=3 nodelay;
            include /etc/nginx/conf.d/_proxy_backend.conf;
        }

        location /api/ {
            limit_req zone=api_zone burst=30 nodelay;
            set $backend_upstream backend:8000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }

        # -----------------------------------------------------------------
        # Frontend SPA (statique servi par le service frontend nginx)
        # -----------------------------------------------------------------
        location / {
            set $frontend_upstream frontend:80;
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
