<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #00ff00;
      font-family: Inter, Arial, sans-serif;
    }
    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #00ff00;
      color: white;
    }
    .card {
      position: absolute;
      box-sizing: border-box;
      color: #fff;
      text-shadow: 0 5px 18px rgba(0,0,0,0.88);
    }
    .intro_card {
      left: 7%; top: 10%; width: 86%; min-height: 12%;
      padding: 32px 42px;
      border-radius: 34px;
      background: linear-gradient(135deg, rgba(6, 10, 18, .92), rgba(12, 30, 42, .84));
      border: 3px solid rgba(44,247,255,.62);
      box-shadow: 0 30px 90px rgba(0,0,0,.56), 0 0 38px rgba(44,247,255,.35);
      animation: pop 520ms cubic-bezier(.16,1,.3,1) both;
    }
    .lower_third, .explain_card, .flow_step {
      left: 7%; top: 9%; max-width: 62%;
      padding: 22px 30px 24px 34px;
      border-radius: 26px;
      background: rgba(0, 0, 0, .90);
      border-left: 14px solid #2cf7ff;
      box-shadow: 0 24px 70px rgba(0,0,0,.70), 0 0 34px rgba(44,247,255,.18);
      animation: slideIn 480ms cubic-bezier(.16,1,.3,1) both;
    }
    .flow_step { border-left-color: #ffe500; }
    .metric_pill {
      right: 7%; top: 30%;
      padding: 16px 24px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .72);
      border: 2px solid rgba(44,247,255,.72);
      box-shadow: 0 0 34px rgba(44,247,255,.28);
      animation: pill 420ms cubic-bezier(.16,1,.3,1) both;
    }
    .broll_title, .impact {
      left: 7%; top: 6%;
      padding: 14px 24px;
      border-radius: 999px;
      background: rgba(0,0,0,.68);
      color: #ffe500;
      font-weight: 950;
      font-size: clamp(54px, 7vw, 92px);
      letter-spacing: -2px;
      animation: pop 300ms cubic-bezier(.16,1,.3,1) both;
    }
    .script {
      left: 9%; top: 15%;
      color: #2cf7ff;
      font-size: clamp(42px, 5.4vw, 78px);
      font-style: italic;
      font-weight: 700;
      animation: scriptIn 520ms cubic-bezier(.16,1,.3,1) both;
    }
    .cta {
      left: 8%; bottom: 13%; width: 84%;
      text-align: center;
      padding: 28px 34px;
      border-radius: 36px;
      background: linear-gradient(135deg, rgba(0,0,0,.86), rgba(44,247,255,.20));
      border: 4px solid white;
      box-shadow: 0 32px 100px rgba(0,0,0,.64), 0 0 45px rgba(44,247,255,.32);
      animation: pop 460ms cubic-bezier(.16,1,.3,1) both;
    }
    .title { color:#ffffff; font-size: clamp(46px, 6.2vw, 88px); font-weight: 950; line-height: .98; letter-spacing: -1.6px; text-transform: uppercase; text-shadow: 0 5px 0 #000, 0 0 22px rgba(0,0,0,.95); }
    .subtitle { margin-top: 12px; color: #ffffff; font-size: clamp(28px, 3.5vw, 46px); font-weight: 900; text-shadow: 0 4px 0 #000, 0 0 18px rgba(0,0,0,.95); }
    .step { display: inline-flex; align-items: center; justify-content: center; width: 52px; height: 52px; margin-right: 14px; border-radius: 50%; background: #2cf7ff; color: #001014; font-weight: 950; }
    .flash { position:absolute; inset:0; background:white; opacity:0; animation: flash 180ms ease-out both; }
    .leak { position:absolute; inset:-10%; background:linear-gradient(105deg, transparent 0%, transparent 36%, rgba(255,255,255,.28) 48%, rgba(44,247,255,.13) 54%, transparent 66%); mix-blend-mode:screen; animation: leak 360ms ease-out both; }
    @keyframes slideIn { from { opacity:0; transform: translateX(-90px) scale(.94); } to { opacity:1; transform: translateX(0) scale(1); } }
    @keyframes pop { from { opacity:0; transform: scale(.70) translateY(55px); } to { opacity:1; transform: scale(1) translateY(0); } }
    @keyframes pill { from { opacity:0; transform: translateX(80px) scale(.82); } to { opacity:1; transform: translateX(0) scale(1); } }
    @keyframes scriptIn { from { opacity:0; transform: rotate(-4deg) translateY(36px); } to { opacity:1; transform: rotate(-2deg) translateY(0); } }
    @keyframes flash { 0% { opacity:.86; } 100% { opacity:0; } }
    @keyframes leak { from { opacity:0; transform:translateX(-70%); } 25% { opacity:1; } to { opacity:0; transform:translateX(70%); } }
  </style>
</head>
<body>
  <div id="stage">
    <div class="leak"></div>
    <div class="flash"></div>
    <div class="card {{kind}}">
      <div class="title"><span class="step">{{step}}</span>{{title}}</div>
      <div class="subtitle">{{subtitle}}</div>
    </div>
  </div>
</body>
</html>
