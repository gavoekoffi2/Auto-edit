name: Deploy backend to VPS

# Auto-deploys the backend (FastAPI + Celery worker + Postgres + Redis + Caddy)
# to the production VPS whenever backend-related code lands on main —
# AFTER the test suite passes (a red test suite never reaches production).
#
# It SSHes in and runs the repo's own idempotent deploy.sh, which pulls the
# latest main, preserves .env, rebuilds the Docker stack and health-checks it.
#
# Required GitHub secrets (Settings -> Secrets and variables -> Actions):
#   VPS_SSH_HOST   public host/IP of the VPS   (e.g. srv1305401.hstgr.cloud)
#   VPS_SSH_USER   SSH user                     (e.g. root)
#   VPS_SSH_KEY    private SSH key (PEM) authorised on the VPS
#   VPS_SSH_PORT   (optional) SSH port          (default 22)
# Optional repo variable:
#   VPS_APP_DIR    checkout dir on the VPS      (default /opt/Auto-edit)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "renderers/**"
      - "templates/**"
      - "worker.Dockerfile"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - "deploy.sh"
      - "Caddyfile"
      - "nginx/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

# Never run two backend deploys at once; let an in-flight one finish.
concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  test:
    name: Backend tests (gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install ffmpeg + fonts (engine render smoke tests)
        run: sudo apt-get update -q && sudo apt-get install -y -q ffmpeg fonts-dejavu-core

      - name: Install Python deps (skip heavy ML/video libs not needed by tests)
        working-directory: backend
        run: |
          grep -vE '^(openai-whisper|moviepy|scenedetect|auto-editor|psycopg2-binary)' requirements.txt > /tmp/requirements-ci.txt
          pip install -r /tmp/requirements-ci.txt aiosqlite

      - name: Run test suite
        working-directory: backend
        run: python -m pytest tests/ -q

  deploy-backend:
    needs: test
    runs-on: ubuntu-latest
    steps:
      # ÉCHEC EXPLICITE si les secrets manquent. L'ancien comportement
      # (skip + warning, job vert) a caché pendant des jours que RIEN
      # n'était déployé sur le VPS — interface neuve, moteur ancien.
      - name: Check deploy secrets are configured
        env:
          HOST: ${{ secrets.VPS_SSH_HOST }}
        run: |
          if [ -z "$HOST" ]; then
            echo "::error title=Backend deploy IMPOSSIBLE::Les secrets VPS_SSH_HOST / VPS_SSH_USER / VPS_SSH_KEY ne sont pas configurés (Settings > Secrets and variables > Actions). Le VPS n'a PAS reçu ce code. Voir DEPLOYMENT.md §Auto-déploiement."
            exit 1
          fi
          echo "Secrets OK — déploiement vers le VPS."

      # Tentative push-based (best-effort). Le pare-feu du VPS bloque souvent
      # les runners GitHub (dial tcp ... i/o timeout) — dans ce cas ce step
      # échoue mais NE BLOQUE PAS: le déploiement fiable est PULL-BASED via le
      # timer systemd installé par scripts/install-vps-autodeploy.sh (le VPS
      # interroge GitHub lui-même toutes les ~2 min). Voir DEPLOYMENT.md.
      - name: Deploy over SSH (best-effort)
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          timeout: 60s
          command_timeout: 40m
          script: |
            set -euo pipefail
            APP_DIR="${{ vars.VPS_APP_DIR || '/root/projects/Auto-edit' }}"
            echo "[ci-deploy] Updating $APP_DIR to origin/main"
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            # deploy.sh preserves .env, rebuilds the stack and health-checks it.
            ./deploy.sh
            echo "[ci-deploy] Backend deploy finished."

      - name: Deploy mechanism note
        run: |
          echo "Si le step SSH ci-dessus est rouge (timeout), c'est le pare-feu"
          echo "du VPS qui bloque GitHub. Le déploiement fiable est PULL-BASED:"
          echo "le VPS tire main tout seul via le timer cutforge-autodeploy."
          echo "Installer une fois: sudo ./scripts/install-vps-autodeploy.sh"
